name: CI

on:
  push:
    branches: [main, feature/*, bugfix/*, docs/*, release/*, hotfix/*]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v6

      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check .
          mypy .

      - name: Run tests
        run: pytest -v --cov=.
      

  phenotype-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate governance docs
        run: |
          test -s AGENTS.md
          test -s CLAUDE.md
          test -s SECURITY.md
          test -s CODEOWNERS
          test -s .github/CODEOWNERS
          ! grep -R -E "^(<<<<<<<|=======|>>>>>>>)" .github AGENTS.md CLAUDE.md SECURITY.md CODEOWNERS
