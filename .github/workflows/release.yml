name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'release:') || contains(github.event.head_commit.message, 'chore(release)')
    outputs:
      version: $123steps.version.outputs.version125
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build
        run: python -m build

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to PyPI
        run: |
          twine upload dist/* -u __token__ -p $123secrets.PYPI_API_TOKEN125
      

  promote:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Promote to staging
        uses: KooshaPari/phenotypeActions/promote@main
        with:
          version: $123needs.release.outputs.version125
          channel: beta
          registry: pypi
